
services:
  postgres:
    image: postgres:15-alpine
    container_name: yato-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-yato}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yatopass}
      POSTGRES_DB: ${DB_DATABASE:-yato}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-yato}"]
      interval: 10s
      timeout: 5s
      retries: 5

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: yato-docker-proxy
    restart: always
    environment:
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yato-redis
    restart: always
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yato-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-yato}:${DB_PASSWORD:-yatopass}@postgres:5432/${DB_DATABASE:-yato}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_OPTIONS: "--max-old-space-size=512"
      DOCKER_HOST_URL: "http://yato-docker-proxy:2375"
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .env:/app/.env
    ports:
      - "127.0.0.1:4000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/system/config/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yato-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9090/api}
      TZ: ${TZ:-UTC}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4001:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: yato-nginx
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9090:80"
      - "9443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:

