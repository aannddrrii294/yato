
services:
  postgres:
    image: postgres:15-alpine
    container_name: yato-postgres
    restart: always
    environment:
      POSTGRES_USER: yato
      POSTGRES_PASSWORD: yatopass
      POSTGRES_DB: yato
      TZ: ${TZ:-UTC}
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: yato-redis
    restart: always
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yato-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://yato:yatopass@postgres:5432/yato?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TZ: ${TZ:-UTC}
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yato-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      TZ: ${TZ:-UTC}
    depends_on:
      - backend
    ports:
      - "4001:3000"

  yato-plugin-proxmox:
    build:
      context: ./plugins/proxmox-mock
      dockerfile: Dockerfile
    container_name: yato-plugin-proxmox
    restart: always
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "5010:5001"

  nginx:
    image: nginx:alpine
    container_name: yato-nginx
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9090:80"
      - "9443:443"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:

